<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Budget</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='budget_settings.css') }}">
</head>
<body>
    {% include 'navbar_template.html' %}

    <div class="container">
        <h1>Set Your Budget</h1>
        <form action="{{ url_for('budget_settings') }}" method="post">
            <label for="budget">Monthly Budget:</label>
            <input type="number" id="budget" name="budget" step="0.01" required>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        {% if 'Successfully' in message %}
                            <div class="success-message">
                                {{ message }}
                            </div>
                        {% else %}
                        <div class="error-message">
                            {{ message }}
                        </div>
                        {% endif %}
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <button type="submit">Save Budget</button>
        </form>
    </div>

</body>
</html>
